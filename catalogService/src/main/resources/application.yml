server:
  port: 9090

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: 123456
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    show-sql: true

  sql:
    init:
      mode: always